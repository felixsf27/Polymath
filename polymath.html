<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Polymath</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7c6fff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Polymath">
<link rel="apple-touch-icon" href="icon.svg">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d0d1a;
  --surface: #16162a;
  --surface2: #1e1e3a;
  --accent: #7c6fff;
  --accent-light: #a89fff;
  --gold: #e8c98a;
  --text: #e8e8f0;
  --muted: #7a7a9a;
  --history: #f0a85a;
  --psych: #5aaaf0;
  --arg: #5af0a8;
  --radius: 12px;
  --transition: 0.2s ease;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
  padding-bottom: 80px;
}

.nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  background: var(--surface);
  border-top: 1px solid rgba(255,255,255,0.08);
  display: flex;
  padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
  z-index: 100;
}

.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 8px;
  background: none;
  border: none;
  color: var(--muted);
  font-size: 11px;
  cursor: pointer;
  transition: color var(--transition);
}

.nav-btn.active { color: var(--accent); }
.nav-btn svg { width: 22px; height: 22px; }

.view { display: none; padding: 20px; padding-top: 16px; }
.view.active { display: block; }

.card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}

.card-sm {
  background: var(--surface2);
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 8px;
}

.topic-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
}

.topic-chip.history { background: rgba(240,168,90,0.15); color: var(--history); }
.topic-chip.psychology { background: rgba(90,170,240,0.15); color: var(--psych); }
.topic-chip.argumentation { background: rgba(90,240,168,0.15); color: var(--arg); }

.topic-cards { display: flex; flex-direction: column; gap: 12px; margin-top: 16px; }

.topic-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 20px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: border-color var(--transition), transform var(--transition);
  display: flex;
  align-items: center;
  gap: 16px;
}

.topic-card:active { transform: scale(0.98); }
.topic-card.history:active, .topic-card.history:hover { border-color: var(--history); }
.topic-card.psychology:active, .topic-card.psychology:hover { border-color: var(--psych); }
.topic-card.argumentation:active, .topic-card.argumentation:hover { border-color: var(--arg); }

.topic-icon {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.history .topic-icon { background: rgba(240,168,90,0.15); }
.psychology .topic-icon { background: rgba(90,170,240,0.15); }
.argumentation .topic-icon { background: rgba(90,240,168,0.15); }

.topic-info h3 { font-size: 17px; font-weight: 600; margin-bottom: 2px; }
.topic-info p { font-size: 13px; color: var(--muted); }

.stats-row { display: flex; gap: 12px; margin-bottom: 20px; }

.stat-box {
  flex: 1;
  background: var(--surface);
  border-radius: var(--radius);
  padding: 14px;
  text-align: center;
}

.stat-box .num { font-size: 28px; font-weight: 700; color: var(--accent); line-height: 1; }
.stat-box .label { font-size: 11px; color: var(--muted); margin-top: 4px; }

.video-item {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 10px;
  border: 1px solid rgba(255,255,255,0.06);
  transition: border-color var(--transition);
}

.video-channel { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
.video-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; line-height: 1.3; }
.video-desc { font-size: 13px; color: var(--muted); line-height: 1.4; }
.video-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }

.btn {
  padding: 12px 20px;
  border-radius: 10px;
  border: none;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity var(--transition), transform var(--transition);
  display: inline-flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
}

.btn:active { opacity: 0.8; transform: scale(0.98); }
.btn-primary { background: var(--accent); color: white; }
.btn-secondary { background: var(--surface2); color: var(--text); }
.btn-outline { background: transparent; border: 1.5px solid var(--accent); color: var(--accent); }
.btn-danger { background: transparent; border: 1.5px solid #f06060; color: #f06060; }
.btn-sm { padding: 8px 14px; font-size: 13px; }
.btn-full { width: 100%; justify-content: center; }

.question-block { margin-bottom: 16px; }
.question-label { font-size: 14px; font-weight: 600; margin-bottom: 8px; color: var(--accent-light); display: block; }
.question-num { font-size: 11px; color: var(--muted); margin-bottom: 4px; }

textarea {
  width: 100%;
  background: var(--surface2);
  border: 1.5px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  color: var(--text);
  font-size: 15px;
  font-family: inherit;
  padding: 12px;
  resize: none;
  min-height: 80px;
  line-height: 1.5;
  transition: border-color var(--transition);
}

textarea:focus { outline: none; border-color: var(--accent); }

input[type="text"], input[type="url"] {
  width: 100%;
  background: var(--surface2);
  border: 1.5px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  color: var(--text);
  font-size: 15px;
  font-family: inherit;
  padding: 12px;
  line-height: 1.5;
  transition: border-color var(--transition);
}

input[type="text"]:focus, input[type="url"]:focus { outline: none; border-color: var(--accent); }
input::placeholder { color: var(--muted); }

.entry-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 10px;
  border-left: 3px solid transparent;
  cursor: pointer;
  transition: opacity var(--transition);
}

.entry-card:active { opacity: 0.7; }
.entry-card.history { border-left-color: var(--history); }
.entry-card.psychology { border-left-color: var(--psych); }
.entry-card.argumentation { border-left-color: var(--arg); }

.entry-date { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
.entry-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.entry-preview { font-size: 13px; color: var(--muted); line-height: 1.4; }

.section-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 12px;
  margin-top: 20px;
}

.section-title:first-child { margin-top: 0; }

.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--muted);
  font-size: 14px;
  cursor: pointer;
  margin-bottom: 16px;
  padding: 4px 0;
  background: none;
  border: none;
}

.empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 15px; line-height: 1.5; }

.toast {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%);
  background: #2a2a4a;
  color: var(--text);
  padding: 12px 20px;
  border-radius: 20px;
  font-size: 14px;
  opacity: 0;
  transition: opacity 0.3s;
  z-index: 200;
  white-space: nowrap;
  pointer-events: none;
}

.toast.show { opacity: 1; }

.progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.progress-label { font-size: 12px; color: var(--muted); width: 110px; flex-shrink: 0; }
.progress-bar { flex: 1; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
.progress-count { font-size: 12px; color: var(--muted); width: 20px; text-align: right; }

h2 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }

.hint-box {
  background: rgba(124,111,255,0.08);
  border: 1px solid rgba(124,111,255,0.2);
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 13px;
  color: var(--accent-light);
  line-height: 1.5;
  margin-bottom: 16px;
}

.overlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 300;
  overflow-y: auto;
  padding: 20px;
  padding-bottom: 40px;
  max-width: 480px;
  margin: 0 auto;
}

.review-banner {
  background: rgba(232,201,138,0.08);
  border: 1.5px solid rgba(232,201,138,0.3);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 16px;
}

.review-banner-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--gold);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 8px;
}

.review-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0;
  border-top: 1px solid rgba(255,255,255,0.06);
  cursor: pointer;
}

.review-item:first-of-type { border-top: none; }

.review-item-title {
  font-size: 14px;
  font-weight: 500;
  flex: 1;
  margin-right: 12px;
}

.review-item-date { font-size: 11px; color: var(--muted); }
</style>
</head>

<!-- HOME VIEW -->

function esc(str) {
  if (!str) return '';
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  currentView = name;

  if (name === 'home') renderHome();
  if (name === 'learn') renderLearn();
  if (name === 'history') renderHistory();
}

  const now = new Date();

  document.getElementById('stat-total').textContent = entries.length;

function entryCardHTML(e) {
  const t = TOPICS[e.topic];
  const firstAnswer = (e.answers || []).find(a => a.trim()) || '';
  const preview = esc(firstAnswer).substring(0, 100) + (firstAnswer.length > 100 ? '...' : '');
  return `
    <div class="entry-card ${e.topic}" onclick="showEntryDetail('${e.id}')">
      <div class="entry-date">${formatDate(e.date)}</div>
      <div style="margin-bottom: 6px;">
        <span class="topic-chip ${e.topic}">${t.icon} ${t.label}</span>
      </div>
      <div class="entry-title">${esc(e.videoTitle)}</div>
      ${preview ? `<div class="entry-preview">${preview}</div>` : ''}
    </div>
  `;
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const months = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
  return d.getDate() + '. ' + months[d.getMonth()] + ' ' + d.getFullYear();
}

function selectTopic(topic) {

function selectVideo(videoId) {

  learnState.video = video;
  learnState.step = 'reflect';
  renderLearn();
}

function extractYouTubeId(url) {
  if (!url) return null;
  const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/);
  return m ? m[1] : null;
}

function selectCustomVideo() {
  const title = document.getElementById('custom-title').value.trim();
  if (!title) { showToast('Gib einen Videotitel ein.'); return; }
  const urlInput = document.getElementById('custom-url').value.trim();
  const ytId = extractYouTubeId(urlInput);
  learnState.video = {
    id: 'custom_' + Date.now(),
    title: title,
    channel: 'Eigenes Video',
    search: null,
    ytId: ytId,
    customUrl: urlInput || null
  };
  learnState.step = 'reflect';
  renderLearn();
}

function learnBack() {

function saveReflection() {
  const answers = [0, 1, 2].map(i => {
    const el = document.getElementById('q' + i);
    return el ? el.value.trim() : '';
  });

  if (answers.every(a => !a)) {
    showToast('Beantworte mindestens eine Frage.');
    return;
  }

  const entry = {
    id: Date.now().toString(),
    date: new Date().toISOString().split('T')[0],
    topic: learnState.topic,
    videoId: learnState.video.id || null,
    videoTitle: learnState.video.title,
    videoChannel: learnState.video.channel,
    videoSearch: learnState.video.search || null,
    videoYtId: learnState.video.ytId || null,
    answers: answers,
    reviewAnswer: null,
    reviewDate: null
  };

  entries.push(entry);
  saveEntries();

  learnState = { step: 'topics', topic: null, video: null };
  showToast('Gespeichert.');
  showView('home');
}

function deleteEntry(id, btn) {
  if (!confirm('Eintrag wirklich löschen?')) return;
  entries = entries.filter(e => e.id !== id);
  saveEntries();
  btn.closest('.overlay').remove();
  if (currentView === 'history') renderHistory();
  if (currentView === 'home') renderHome();
  showToast('Gelöscht.');
}

function saveCustomReviewQ(id) {
  const input = document.getElementById('crq-input-' + id);
  if (!input) return;
  const q = input.value.trim();
  if (!q) { showToast('Frage ist leer.'); return; }
  const idx = entries.findIndex(e => e.id === id);
  if (idx === -1) return;
  entries[idx].customReviewQuestion = q;
  saveEntries();
  document.querySelectorAll('.overlay').forEach(o => o.remove());
  showEntryDetail(id);
  showToast('Wiederholungsfrage gespeichert.');
}

function editCustomReviewQ(id) {
  const idx = entries.findIndex(e => e.id === id);
  if (idx === -1) return;
  entries[idx].customReviewQuestion = null;
  saveEntries();
  document.querySelectorAll('.overlay').forEach(o => o.remove());
  showEntryDetail(id);
}

function isReviewDue(entry) {
  if (entry.reviewAnswer) return false;
  const entryDate = new Date(entry.date + 'T12:00:00');
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const diffDays = Math.floor((today - entryDate) / (1000 * 60 * 60 * 24));
  return diffDays >= 1;
}

  overlay.innerHTML = `
    <button class="back-btn" onclick="this.closest('.overlay').remove()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Zurück
    </button>
    <div style="background:rgba(232,201,138,0.1); border:1px solid rgba(232,201,138,0.3); border-radius:8px; padding:8px 12px; font-size:12px; color:var(--gold); font-weight:600; display:inline-block; margin-bottom:14px;">
      Wiederholung — 24h später
    </div>
    <span class="topic-chip ${entry.topic}">${t.icon} ${t.label}</span>
    <h2 style="margin-top:10px; margin-bottom:4px; font-size:17px; line-height:1.3;">${esc(entry.videoTitle)}</h2>
    <p style="font-size:13px; color:var(--muted); margin-bottom:20px;">${formatDate(entry.date)}</p>
    <div class="hint-box" style="margin-bottom:16px;">
      Ohne nachzusehen. Was dein Gehirn jetzt abruft, bleibt.
    </div>
    <div class="question-block">
      <label class="question-label">${reviewQ}</label>
      <textarea id="review-answer" placeholder="Deine Antwort..."></textarea>
    </div>
    <button class="btn btn-primary btn-full" onclick="saveReview('${id}', this)">
      Speichern
    </button>
  `;
  document.body.appendChild(overlay);
}

function saveReview(id, btn) {
  const answer = document.getElementById('review-answer').value.trim();
  if (!answer) { showToast('Schreib etwas hin, auch wenn es wenig ist.'); return; }
  const idx = entries.findIndex(e => e.id === id);
  if (idx === -1) return;
  entries[idx].reviewAnswer = answer;
  entries[idx].reviewDate = new Date().toISOString().split('T')[0];
  saveEntries();
  btn.closest('.overlay').remove();
  renderHome();
  showToast('Wiederholung gespeichert.');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// --- Supabase Sync ---
const SUPABASE_URL  = 'https://odterkucrlydpkusurdx.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9kdGVya3Vjcmx5ZHBrdXN1cmR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3MzkwNjYsImV4cCI6MjA5NjMxNTA2Nn0.eDRLy505SM2FMp8baYPebzLxeyIFYd17XwmxdioTHWs';
const SYNC_KEY = 'polymath_entries';

let _sb = null, _user = null, _pulling = false, _syncTimer = null;

function sb() {
  if (!_sb) _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  return _sb;
}

async function pushToCloud() {
  if (!_user) return;
  const val = JSON.parse(localStorage.getItem(SYNC_KEY) || '[]');
  await sb().from('user_data').upsert(
    [{ user_id: _user.id, key: SYNC_KEY, value: val }],
    { onConflict: 'user_id,key' }
  );
}

async function pullFromCloud() {
  if (!_user) return;
  const { data } = await sb().from('user_data')
    .select('value').eq('user_id', _user.id).eq('key', SYNC_KEY).single();
  if (data?.value) {
    _pulling = true;
    localStorage.setItem(SYNC_KEY, JSON.stringify(data.value));
    _pulling = false;
  }
}

async function signInWithGitHub() {
  await sb().auth.signInWithOAuth({
    provider: 'github',
    options: { redirectTo: window.location.origin + window.location.pathname }
  });
}

async function signOutUser() {
  await sb().auth.signOut();
  _user = null;
  updateSyncUI();
}

function updateSyncUI() {
  const el = document.getElementById('sync-status');
  if (!el) return;
  if (_user) {
    el.innerHTML = `
      <span style="color:var(--arg);font-size:12px;">Sync aktiv — ${esc(_user.user_metadata?.user_name || 'GitHub')}</span>
      <button onclick="signOutUser()" style="background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;padding:0;">Abmelden</button>
    `;
  } else {
    el.innerHTML = `
      <span style="color:var(--muted);font-size:12px;">Nur lokal gespeichert</span>
      <button onclick="signInWithGitHub()" style="background:none;border:none;color:var(--accent);font-size:12px;cursor:pointer;padding:0;">Mit GitHub anmelden</button>
    `;
  }
}

async function syncInit() {
  const { data: { session } } = await sb().auth.getSession();
  if (session?.user) {
    _user = session.user;
    await pullFromCloud();
    entries = JSON.parse(localStorage.getItem(SYNC_KEY) || '[]');
  }

  sb().auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session?.user) {
      _user = session.user;
      await pullFromCloud();
      entries = JSON.parse(localStorage.getItem(SYNC_KEY) || '[]');
      renderHome();
      updateSyncUI();
    } else if (event === 'SIGNED_OUT') {
      _user = null;
      updateSyncUI();
    }
  });

  const _orig = Storage.prototype.setItem;
  Storage.prototype.setItem = function(key, value) {
    _orig.call(this, key, value);
    if (!_pulling && this === localStorage && _user && key === SYNC_KEY) {
      clearTimeout(_syncTimer);
      _syncTimer = setTimeout(pushToCloud, 2000);
    }
  };

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'hidden' && _user) pushToCloud();
  });

  updateSyncUI();
  renderHome();
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}

syncInit();
</script>
