<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Polymath</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d0d1a;
  --surface: #16162a;
  --surface2: #1e1e3a;
  --accent: #7c6fff;
  --accent-light: #a89fff;
  --gold: #e8c98a;
  --text: #e8e8f0;
  --muted: #7a7a9a;
  --history: #f0a85a;
  --psych: #5aaaf0;
  --arg: #5af0a8;
  --radius: 12px;
  --transition: 0.2s ease;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
  padding-bottom: 80px;
}

.nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  background: var(--surface);
  border-top: 1px solid rgba(255,255,255,0.08);
  display: flex;
  padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
  z-index: 100;
}

.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 8px;
  background: none;
  border: none;
  color: var(--muted);
  font-size: 11px;
  cursor: pointer;
  transition: color var(--transition);
}

.nav-btn.active { color: var(--accent); }
.nav-btn svg { width: 22px; height: 22px; }

.view { display: none; padding: 20px; padding-top: 16px; }
.view.active { display: block; }

.card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}

.card-sm {
  background: var(--surface2);
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 8px;
}

.topic-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
}

.topic-chip.history { background: rgba(240,168,90,0.15); color: var(--history); }
.topic-chip.psychology { background: rgba(90,170,240,0.15); color: var(--psych); }
.topic-chip.argumentation { background: rgba(90,240,168,0.15); color: var(--arg); }

.topic-cards { display: flex; flex-direction: column; gap: 12px; margin-top: 16px; }

.topic-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 20px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: border-color var(--transition), transform var(--transition);
  display: flex;
  align-items: center;
  gap: 16px;
}

.topic-card:active { transform: scale(0.98); }
.topic-card.history:active, .topic-card.history:hover { border-color: var(--history); }
.topic-card.psychology:active, .topic-card.psychology:hover { border-color: var(--psych); }
.topic-card.argumentation:active, .topic-card.argumentation:hover { border-color: var(--arg); }

.topic-icon {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.history .topic-icon { background: rgba(240,168,90,0.15); }
.psychology .topic-icon { background: rgba(90,170,240,0.15); }
.argumentation .topic-icon { background: rgba(90,240,168,0.15); }

.topic-info h3 { font-size: 17px; font-weight: 600; margin-bottom: 2px; }
.topic-info p { font-size: 13px; color: var(--muted); }

.stats-row { display: flex; gap: 12px; margin-bottom: 20px; }

.stat-box {
  flex: 1;
  background: var(--surface);
  border-radius: var(--radius);
  padding: 14px;
  text-align: center;
}

.stat-box .num { font-size: 28px; font-weight: 700; color: var(--accent); line-height: 1; }
.stat-box .label { font-size: 11px; color: var(--muted); margin-top: 4px; }

.video-item {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 10px;
  border: 1px solid rgba(255,255,255,0.06);
  transition: border-color var(--transition);
}

.video-channel { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
.video-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; line-height: 1.3; }
.video-desc { font-size: 13px; color: var(--muted); line-height: 1.4; }
.video-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }

.btn {
  padding: 12px 20px;
  border-radius: 10px;
  border: none;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity var(--transition), transform var(--transition);
  display: inline-flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
}

.btn:active { opacity: 0.8; transform: scale(0.98); }
.btn-primary { background: var(--accent); color: white; }
.btn-secondary { background: var(--surface2); color: var(--text); }
.btn-outline { background: transparent; border: 1.5px solid var(--accent); color: var(--accent); }
.btn-danger { background: transparent; border: 1.5px solid #f06060; color: #f06060; }
.btn-sm { padding: 8px 14px; font-size: 13px; }
.btn-full { width: 100%; justify-content: center; }

.question-block { margin-bottom: 16px; }
.question-label { font-size: 14px; font-weight: 600; margin-bottom: 8px; color: var(--accent-light); display: block; }
.question-num { font-size: 11px; color: var(--muted); margin-bottom: 4px; }

textarea {
  width: 100%;
  background: var(--surface2);
  border: 1.5px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  color: var(--text);
  font-size: 15px;
  font-family: inherit;
  padding: 12px;
  resize: none;
  min-height: 80px;
  line-height: 1.5;
  transition: border-color var(--transition);
}

textarea:focus { outline: none; border-color: var(--accent); }

input[type="text"], input[type="url"] {
  width: 100%;
  background: var(--surface2);
  border: 1.5px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  color: var(--text);
  font-size: 15px;
  font-family: inherit;
  padding: 12px;
  line-height: 1.5;
  transition: border-color var(--transition);
}

input[type="text"]:focus, input[type="url"]:focus { outline: none; border-color: var(--accent); }
input::placeholder { color: var(--muted); }

.entry-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 10px;
  border-left: 3px solid transparent;
  cursor: pointer;
  transition: opacity var(--transition);
}

.entry-card:active { opacity: 0.7; }
.entry-card.history { border-left-color: var(--history); }
.entry-card.psychology { border-left-color: var(--psych); }
.entry-card.argumentation { border-left-color: var(--arg); }

.entry-date { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
.entry-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.entry-preview { font-size: 13px; color: var(--muted); line-height: 1.4; }

.section-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 12px;
  margin-top: 20px;
}

.section-title:first-child { margin-top: 0; }

.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--muted);
  font-size: 14px;
  cursor: pointer;
  margin-bottom: 16px;
  padding: 4px 0;
  background: none;
  border: none;
}

.empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 15px; line-height: 1.5; }

.toast {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%);
  background: #2a2a4a;
  color: var(--text);
  padding: 12px 20px;
  border-radius: 20px;
  font-size: 14px;
  opacity: 0;
  transition: opacity 0.3s;
  z-index: 200;
  white-space: nowrap;
  pointer-events: none;
}

.toast.show { opacity: 1; }

.progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.progress-label { font-size: 12px; color: var(--muted); width: 110px; flex-shrink: 0; }
.progress-bar { flex: 1; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
.progress-count { font-size: 12px; color: var(--muted); width: 20px; text-align: right; }

h2 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }

.hint-box {
  background: rgba(124,111,255,0.08);
  border: 1px solid rgba(124,111,255,0.2);
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 13px;
  color: var(--accent-light);
  line-height: 1.5;
  margin-bottom: 16px;
}

.overlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 300;
  overflow-y: auto;
  padding: 20px;
  padding-bottom: 40px;
  max-width: 480px;
  margin: 0 auto;
}
</style>
</head>
<body>

<!-- HOME VIEW -->
<div id="view-home" class="view active">
  <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;">
    <div>
      <div style="font-size: 26px; font-weight: 700;">Polymath</div>
      <div class="subtitle" id="home-date"></div>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-box">
      <div class="num" id="stat-total">0</div>
      <div class="label">Videos</div>
    </div>
    <div class="stat-box">
      <div class="num" id="stat-days">0</div>
      <div class="label">Tage aktiv</div>
    </div>
    <div class="stat-box">
      <div class="num" id="stat-topics">0</div>
      <div class="label">Themen</div>
    </div>
  </div>

  <div class="card">
    <div class="section-title" style="margin-top: 0;">Fortschritt</div>
    <div id="progress-bars"></div>
  </div>

  <div class="section-title">Zuletzt gelernt</div>
  <div id="recent-entries"></div>

  <button class="btn btn-primary btn-full" onclick="showView('learn')" style="margin-top: 8px;">
    Jetzt lernen
  </button>
</div>

<!-- LEARN VIEW -->
<div id="view-learn" class="view">
  <div id="learn-content"></div>
</div>

<!-- HISTORY VIEW -->
<div id="view-history" class="view">
  <h2 style="margin-bottom: 4px;">Verlauf</h2>
  <p class="subtitle" style="margin-bottom: 16px;">Alles was du bisher gelernt hast</p>
  <div id="history-list"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="nav">
  <button class="nav-btn active" id="nav-home" onclick="showView('home')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
    Start
  </button>
  <button class="nav-btn" id="nav-learn" onclick="showView('learn')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
      <path d="M6 12v5c3 3 9 3 12 0v-5"/>
    </svg>
    Lernen
  </button>
  <button class="nav-btn" id="nav-history" onclick="showView('history')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/>
      <polyline points="12 6 12 12 16 14"/>
    </svg>
    Verlauf
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
const TOPICS = {
  history: {
    label: 'Geschichte',
    icon: '🏛️',
    color: 'var(--history)',
    subtitle: 'Napoleon, Caesar, Mongolen, Inka und mehr'
  },
  psychology: {
    label: 'Psychologie',
    icon: '🧠',
    color: 'var(--psych)',
    subtitle: 'Verhalten, Überzeugung, Selbsterkenntnis'
  },
  argumentation: {
    label: 'Argumentation',
    icon: '⚖️',
    color: 'var(--arg)',
    subtitle: 'Logik, Denkfehler, schwierige Gespräche'
  }
};

const VIDEOS = {
  history: [
    {
      id: 'h1',
      title: 'The Rise and Fall of Napoleon Bonaparte',
      channel: '32Thoughts (Thoughty2)',
      desc: 'Napoleons komplette Geschichte, vom korsischen Außenseiter zum Kaiser bis zum Exil auf Sankt Helena. Einer seiner besten.',
      search: 'thoughty2 napoleon rise fall entire life history'
    },
    {
      id: 'h2',
      title: 'Julius Caesar — The Rise of Rome\'s Greatest General',
      channel: 'Kings and Generals',
      desc: 'Wie Caesar die Republik von innen ausgehöhlt hat. Militär, Politik, und warum die Senatoren ihn umbringen mussten.',
      search: 'kings and generals julius caesar documentary'
    },
    {
      id: 'h3',
      title: 'Genghis Khan and the Mongol Conquests',
      channel: 'Kings and Generals',
      desc: 'Wie ein Nomade aus der Steppe das größte zusammenhängende Landreich der Geschichte aufgebaut hat.',
      search: 'kings and generals genghis khan mongol empire history'
    },
    {
      id: 'h4',
      title: 'The Spanish Conquest of the Inca Empire',
      channel: 'Fall of Civilizations',
      desc: 'Wenige hundert Spanier gegen ein Reich von Millionen. Warum das Inca-Reich kollabiert ist, und was das über Macht verrät.',
      search: 'fall of civilizations inca empire spanish conquest documentary'
    },
    {
      id: 'h5',
      title: 'The Fall of Rome — The Fall of Civilizations',
      channel: 'Fall of Civilizations',
      desc: 'Einer der besten Dokumentarfilme überhaupt. Atmosphärisch und tiefgründig, warum ein 500 Jahre altes Reich aufhört zu existieren.',
      search: 'fall of civilizations rome documentary'
    }
  ],
  psychology: [
    {
      id: 'p1',
      title: 'The Psychology of the Fool',
      channel: 'Eternalized',
      desc: 'Das Video mit 5,8 Mio. Views. Warum intelligente Menschen manchmal die dümmsten Entscheidungen treffen.',
      search: 'eternalized psychology of the fool'
    },
    {
      id: 'p2',
      title: 'The 6 Principles of Persuasion — Robert Cialdini',
      channel: 'Practical Psychology',
      desc: 'Das Grundwerkzeug jedes Marketers. Warum Menschen Ja sagen, und wie man diese Mechanismen erkennt und versteht.',
      search: 'cialdini 6 principles of persuasion influence explained'
    },
    {
      id: 'p3',
      title: 'Why Smart People Believe Stupid Things',
      channel: 'After Skool',
      desc: 'Cognitive Biases und warum niemand immun ist, auch nicht mit hohem IQ. Mit konkreten Beispielen für jeden Denkfehler.',
      search: 'why smart people believe stupid things cognitive bias after skool'
    },
    {
      id: 'p4',
      title: 'The Dark Side of Human Nature — Carl Jung\'s Shadow',
      channel: 'Einzelgänger',
      desc: 'Jungs Konzept des "Schattens", der Teil von uns, den wir unterdrücken und den wir in anderen so unerträglich finden.',
      search: 'einzelganger jung shadow dark side human nature'
    },
    {
      id: 'p5',
      title: 'How to Read Anyone Instantly — Dark Psychology',
      channel: 'Charisma on Command',
      desc: 'Konkrete Techniken, mit denen Menschen beeinflusst werden, und wie man lernt, sie im Alltag zu erkennen.',
      search: 'charisma on command how to read people dark psychology manipulation'
    },
    {
      id: 'p6',
      title: 'The Law of Attraction — How It Actually Works',
      channel: 'Shifted State',
      desc: 'Was hinter dem Konzept steckt, jenseits von Wunschdenken. Wie Gedanken, Überzeugungen und Erwartungen das Verhalten formen, ob man es will oder nicht.',
      search: 'shifted state law of attraction how it works'
    }
  ],
  argumentation: [
    {
      id: 'a1',
      title: 'Logical Fallacies — The Complete Guide',
      channel: 'TED-Ed',
      desc: 'Die häufigsten Denkfehler in Diskussionen. Wer diese kennt, kann gezielter antworten, ohne emotional zu werden.',
      search: 'ted-ed logical fallacies complete guide explained'
    },
    {
      id: 'a2',
      title: 'How to Argue — Lessons from Science',
      channel: 'Veritasium',
      desc: 'Warum Fakten alleine niemanden überzeugen, und was wirklich zählt, wenn man jemanden zum Umdenken bringen will.',
      search: 'veritasium how to argue convince people change mind science'
    },
    {
      id: 'a3',
      title: 'How to Deal with People Who Just Won\'t Listen',
      channel: 'Improvement Pill',
      desc: 'Genau das Problem: Jemand sagt "ich find das aber so", obwohl du weißt, dass es falsch ist. Was dann hilft.',
      search: 'how to deal with stubborn people who wont listen improvement pill'
    },
    {
      id: 'a4',
      title: 'The Art of Thinking Clearly — Key Lessons',
      channel: 'Escaping Ordinary',
      desc: 'Basierend auf Rolf Dobellis Buch. 52 Denkfehler, die wir alle machen, mit Beispielen, die jeder sofort erkennt.',
      search: 'art of thinking clearly rolf dobelli key lessons escaping ordinary'
    },
    {
      id: 'a5',
      title: 'Chris Voss — How to Win Any Negotiation',
      channel: 'MasterClass / Talks at Google',
      desc: 'Chris Voss war FBI-Chefverhandler. Seine Techniken funktionieren bei Entführungen und genauso gut in Alltagsdiskussionen.',
      search: 'chris voss negotiation tactics how to win argument talks at google'
    }
  ]
};

const QUESTIONS = {
  history: [
    'Wer war die Hauptfigur, und welche eine Entscheidung hat alles verändert?',
    'Was hat dich am meisten überrascht? Etwas, das du so nicht erwartet hättest.',
    'Was nimmst du aus dieser Geschichte mit, das heute noch relevant ist?'
  ],
  psychology: [
    'Welches Konzept oder Verhaltensmuster wurde erklärt? Fass es in einem Satz zusammen.',
    'Wann hast du das schon mal bei dir selbst oder bei jemand anderem gesehen?',
    'Wie würdest du das einem Freund erklären, der das Video nicht gesehen hat?'
  ],
  argumentation: [
    'Was war das Hauptargument oder die zentrale Technik, die erklärt wurde?',
    'Welchen Denkfehler oder welche Methode wirst du dir merken, und warum?',
    'In welcher Situation aus deinem Leben könntest du das direkt einsetzen?'
  ]
};

// State
let currentView = 'home';
let learnState = { step: 'topics', topic: null, video: null };
let entries = JSON.parse(localStorage.getItem('polymath_entries') || '[]');

function saveEntries() {
  localStorage.setItem('polymath_entries', JSON.stringify(entries));
}

function esc(str) {
  if (!str) return '';
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  currentView = name;

  if (name === 'home') renderHome();
  if (name === 'learn') renderLearn();
  if (name === 'history') renderHistory();
}

function renderHome() {
  const now = new Date();
  const days = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
  const months = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
  document.getElementById('home-date').textContent =
    days[now.getDay()] + ', ' + now.getDate() + '. ' + months[now.getMonth()] + ' ' + now.getFullYear();

  document.getElementById('stat-total').textContent = entries.length;
  document.getElementById('stat-days').textContent = new Set(entries.map(e => e.date)).size;
  document.getElementById('stat-topics').textContent = new Set(entries.map(e => e.topic)).size;

  const counts = { history: 0, psychology: 0, argumentation: 0 };
  entries.forEach(e => { if (counts[e.topic] !== undefined) counts[e.topic]++; });
  const maxCount = Math.max(...Object.values(counts), 1);

  document.getElementById('progress-bars').innerHTML = Object.entries(TOPICS).map(([key, t]) => `
    <div class="progress-row">
      <div class="progress-label">${t.icon} ${t.label}</div>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${(counts[key]/maxCount*100)}%; background:${t.color};"></div>
      </div>
      <div class="progress-count">${counts[key]}</div>
    </div>
  `).join('');

  const recent = [...entries].reverse().slice(0, 3);
  if (recent.length === 0) {
    document.getElementById('recent-entries').innerHTML = `
      <div class="empty-state">
        <div class="icon">🎓</div>
        <p>Noch keine Einträge. Starte mit deinem ersten Video.</p>
      </div>
    `;
  } else {
    document.getElementById('recent-entries').innerHTML = recent.map(e => entryCardHTML(e)).join('');
  }
}

function entryCardHTML(e) {
  const t = TOPICS[e.topic];
  const firstAnswer = (e.answers || []).find(a => a.trim()) || '';
  const preview = esc(firstAnswer).substring(0, 100) + (firstAnswer.length > 100 ? '...' : '');
  return `
    <div class="entry-card ${e.topic}" onclick="showEntryDetail('${e.id}')">
      <div class="entry-date">${formatDate(e.date)}</div>
      <div style="margin-bottom: 6px;">
        <span class="topic-chip ${e.topic}">${t.icon} ${t.label}</span>
      </div>
      <div class="entry-title">${esc(e.videoTitle)}</div>
      ${preview ? `<div class="entry-preview">${preview}</div>` : ''}
    </div>
  `;
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const months = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
  return d.getDate() + '. ' + months[d.getMonth()] + ' ' + d.getFullYear();
}

function renderLearn() {
  const container = document.getElementById('learn-content');

  if (learnState.step === 'topics') {
    container.innerHTML = `
      <h2 style="margin-bottom: 4px;">Lernen</h2>
      <p class="subtitle" style="margin-bottom: 16px;">Welches Thema heute?</p>
      <div class="topic-cards">
        ${Object.entries(TOPICS).map(([key, t]) => `
          <div class="topic-card ${key}" onclick="selectTopic('${key}')">
            <div class="topic-icon">${t.icon}</div>
            <div class="topic-info">
              <h3>${t.label}</h3>
              <p>${t.subtitle}</p>
            </div>
            <svg style="margin-left:auto; color:var(--muted); flex-shrink:0;" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </div>
        `).join('')}
      </div>
    `;
  }

  else if (learnState.step === 'videos') {
    const topic = learnState.topic;
    const t = TOPICS[topic];
    const videos = VIDEOS[topic];

    container.innerHTML = `
      <button class="back-btn" onclick="learnBack()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Zurück
      </button>
      <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">
        <div class="topic-icon ${topic}" style="width:40px; height:40px;">${t.icon}</div>
        <div>
          <h2 style="margin-bottom:0;">${t.label}</h2>
          <p class="subtitle">5 Videos zur Auswahl</p>
        </div>
      </div>
      <div class="hint-box" style="margin-top: 12px;">
        Klick auf "YouTube" bei einem Video, schau es an, und komm dann zurück und klick auf "Gesehen".
      </div>
      ${videos.map(v => `
        <div class="video-item">
          <div class="video-channel">${esc(v.channel)}</div>
          <div class="video-title">${esc(v.title)}</div>
          <div class="video-desc">${esc(v.desc)}</div>
          <div class="video-actions">
            <a href="https://www.youtube.com/results?search_query=${encodeURIComponent(v.search)}"
               target="_blank" class="btn btn-outline btn-sm">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <polygon points="5 3 19 12 5 21 5 3"/>
              </svg>
              YouTube
            </a>
            <button class="btn btn-primary btn-sm" onclick="selectVideo('${v.id}')">
              Gesehen
            </button>
          </div>
        </div>
      `).join('')}

      <div style="border: 1.5px dashed rgba(255,255,255,0.12); border-radius: var(--radius); padding: 16px; margin-top: 4px;">
        <p style="font-size: 13px; color: var(--muted); margin-bottom: 12px;">Eigenes Video hinzufügen</p>
        <input type="text" id="custom-title" placeholder="Videotitel..." />
        <input type="url" id="custom-url" placeholder="YouTube-Link (optional)..." style="margin-top: 8px;" />
        <button class="btn btn-secondary btn-full btn-sm" onclick="selectCustomVideo()" style="margin-top: 10px;">
          Weiter zu den Fragen
        </button>
      </div>
    `;
  }

  else if (learnState.step === 'reflect') {
    const topic = learnState.topic;
    const video = learnState.video;
    const t = TOPICS[topic];
    const qs = QUESTIONS[topic];

    container.innerHTML = `
      <button class="back-btn" onclick="learnState.step='videos'; renderLearn();">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Zurück
      </button>
      <span class="topic-chip ${topic}">${t.icon} ${t.label}</span>
      <h2 style="margin-top:10px; margin-bottom:4px; font-size:17px; line-height:1.3;">${esc(video.title)}</h2>
      <p style="font-size:13px; color:var(--muted); margin-bottom:20px;">${esc(video.channel)}</p>

      <div class="hint-box">
        Kurz und direkt reicht. Was wirklich hängen geblieben ist, nicht was "richtig klingt".
      </div>

      ${qs.map((q, i) => `
        <div class="question-block">
          <div class="question-num">Frage ${i+1} von 3</div>
          <label class="question-label">${q}</label>
          <textarea id="q${i}" placeholder="Deine Antwort..."></textarea>
        </div>
      `).join('')}

      <button class="btn btn-primary btn-full" onclick="saveReflection()" style="margin-top:8px;">
        Speichern
      </button>
    `;
  }
}

function selectTopic(topic) {
  learnState.topic = topic;
  learnState.step = 'videos';
  renderLearn();
}

function selectVideo(videoId) {
  const video = VIDEOS[learnState.topic].find(v => v.id === videoId);
  learnState.video = video;
  learnState.step = 'reflect';
  renderLearn();
}

function extractYouTubeId(url) {
  if (!url) return null;
  const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/);
  return m ? m[1] : null;
}

function selectCustomVideo() {
  const title = document.getElementById('custom-title').value.trim();
  if (!title) { showToast('Gib einen Videotitel ein.'); return; }
  const urlInput = document.getElementById('custom-url').value.trim();
  const ytId = extractYouTubeId(urlInput);
  learnState.video = {
    id: 'custom_' + Date.now(),
    title: title,
    channel: 'Eigenes Video',
    search: null,
    ytId: ytId,
    customUrl: urlInput || null
  };
  learnState.step = 'reflect';
  renderLearn();
}

function learnBack() {
  learnState = { step: 'topics', topic: null, video: null };
  renderLearn();
}

function saveReflection() {
  const answers = [0, 1, 2].map(i => {
    const el = document.getElementById('q' + i);
    return el ? el.value.trim() : '';
  });

  if (answers.every(a => !a)) {
    showToast('Beantworte mindestens eine Frage.');
    return;
  }

  const entry = {
    id: Date.now().toString(),
    date: new Date().toISOString().split('T')[0],
    topic: learnState.topic,
    videoTitle: learnState.video.title,
    videoChannel: learnState.video.channel,
    videoSearch: learnState.video.search || null,
    videoYtId: learnState.video.ytId || null,
    answers: answers
  };

  entries.push(entry);
  saveEntries();

  learnState = { step: 'topics', topic: null, video: null };
  showToast('Gespeichert.');
  showView('home');
}

function renderHistory() {
  if (entries.length === 0) {
    document.getElementById('history-list').innerHTML = `
      <div class="empty-state">
        <div class="icon">📚</div>
        <p>Noch nichts hier. Dein Verlauf füllt sich, sobald du anfängst.</p>
      </div>
    `;
    return;
  }
  document.getElementById('history-list').innerHTML = [...entries].reverse().map(e => entryCardHTML(e)).join('');
}

function showEntryDetail(id) {
  const entry = entries.find(e => e.id === id);
  if (!entry) return;

  const t = TOPICS[entry.topic];
  const qs = QUESTIONS[entry.topic];

  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <button class="back-btn" onclick="this.closest('.overlay').remove()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Zurück
    </button>
    <span class="topic-chip ${entry.topic}">${t.icon} ${t.label}</span>
    <h2 style="margin-top:10px; margin-bottom:4px; font-size:18px; line-height:1.3;">${esc(entry.videoTitle)}</h2>
    <p style="font-size:13px; color:var(--muted); margin-bottom:2px;">${esc(entry.videoChannel)}</p>
    <p style="font-size:13px; color:var(--muted); margin-bottom:20px;">${formatDate(entry.date)}</p>
    ${qs.map((q, i) => entry.answers[i] ? `
      <div class="card-sm" style="margin-bottom:12px;">
        <div style="font-size:12px; color:var(--muted); margin-bottom:6px;">${q}</div>
        <div style="font-size:15px; line-height:1.5;">${esc(entry.answers[i])}</div>
      </div>
    ` : '').join('')}
    <div style="display:flex; gap:10px; margin-top:16px; flex-wrap:wrap;">
      <a href="${entry.videoYtId
        ? 'https://www.youtube.com/watch?v=' + encodeURIComponent(entry.videoYtId)
        : 'https://www.youtube.com/results?search_query=' + encodeURIComponent(entry.videoSearch || entry.videoTitle)}"
         target="_blank" class="btn btn-outline btn-sm">
        Video ${entry.videoYtId ? 'öffnen' : 'suchen'}
      </a>
      <button class="btn btn-danger btn-sm" onclick="deleteEntry('${entry.id}', this)">
        Eintrag löschen
      </button>
    </div>
  `;

  document.body.appendChild(overlay);
}

function deleteEntry(id, btn) {
  if (!confirm('Eintrag wirklich löschen?')) return;
  entries = entries.filter(e => e.id !== id);
  saveEntries();
  btn.closest('.overlay').remove();
  if (currentView === 'history') renderHistory();
  if (currentView === 'home') renderHome();
  showToast('Gelöscht.');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

renderHome();
</script>
</body>
</html>
